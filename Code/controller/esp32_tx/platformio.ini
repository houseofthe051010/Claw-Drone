[platformio]
default_envs = esp32_pico_uart_espnow_tx
src_dir = main

[env:esp32_pico_uart_espnow_tx]
platform = espressif32
board = esp32dev
framework = espidf
board_build.flash_size = 2MB
board_upload.flash_size = 2MB
upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
